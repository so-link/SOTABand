version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  json:
    format: '{"time": "%(asctime)s", "level": "%(levelname)s", "logger": "%(name)s", "message": "%(message)s"}'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/sotaband.log
    maxBytes: 10485760  # 10MB
    backupCount: 10

loggers:
  sotaband:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  sotaband.core.engine:
    level: DEBUG

  sotaband.core.agent:
    level: DEBUG

  sotaband.core.scheduler:
    level: INFO

root:
  level: WARNING
  handlers: [console]
